name: fleetlift

configs:
  opensandbox-config:
    content: |
      [server]
      host = "0.0.0.0"
      port = 8080
      log_level = "INFO"

      [runtime]
      type = "docker"
      # Pinned: v1.0.9 fixes ExecStream framing; later versions untested
      execd_image = "opensandbox/execd:v1.0.9"

      [egress]
      # Pinned: v1.0.4 matches execd v1.0.9 compatibility
      image = "opensandbox/egress:v1.0.4"

      [docker]
      network_mode = "bridge"
      # host.docker.internal lets sandbox execd endpoints be reachable from the host
      host_ip = "host.docker.internal"
      drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
      no_new_privileges = true
      pids_limit = 512

      [ingress]
      mode = "direct"

services:
  # Temporal server with all components (auto-setup mode)
  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7233:7233"  # gRPC frontend
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/temporal:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - TEMPORAL_UI_ENABLED=true
      - TEMPORAL_NOTIFY_ON_NEW_VERSION=false
      # Enable refresh for live updates
      - TEMPORAL_REFRESH_WORKFLOW_TIMEOUT=1000
    depends_on:
      temporal:
        condition: service_healthy

  # PostgreSQL for Temporal persistence
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    volumes:
      - temporal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OpenSandbox — sandbox execution environment for agent steps
  opensandbox-server:
    # Pinned: v0.1.9 has networkPolicy REST field; later versions may rename it
    image: opensandbox/server:v0.1.9
    container_name: opensandbox-server
    ports:
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml
    environment:
      - SANDBOX_CONFIG_PATH=/etc/opensandbox/config.toml

volumes:
  temporal-postgres:
