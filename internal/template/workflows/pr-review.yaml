version: 1
id: pr-review
title: PR Review
description: Automated code review — fetch PR diff, run agent review, post comments to GitHub.
tags:
  - review
  - automation
  - single-repo
parameters:
  - name: repo_url
    type: string
    required: true
    description: "Repository URL"
  - name: pr_number
    type: int
    required: true
    description: "Pull request number to review"
sandbox_groups:
  main:
    image: claude-code-sandbox:latest
steps:
  - id: fetch_pr
    title: Fetch PR details
    action:
      type: github_fetch_pr
      credentials:
        - GITHUB_TOKEN
      config:
        repo_url: "{{ .Params.repo_url }}"
        pr_number: "{{ .Params.pr_number }}"

  - id: review
    title: Review code changes
    depends_on:
      - fetch_pr
    sandbox_group: main
    mode: report
    repositories:
      - url: "{{ .Params.repo_url }}"
        ref: "refs/pull/{{ .Params.pr_number }}/head"
    execution:
      agent: claude-code
      credentials:
        - GITHUB_TOKEN
      prompt: |
        Review the code changes in this PR thoroughly.

        PR diff:
        {{ .Steps.fetch_pr.Output | toJSON }}

        Check for:
        1. Bugs or logic errors
        2. Security vulnerabilities
        3. Performance issues
        4. Style and convention violations
        5. Missing tests

        Provide specific, actionable feedback with file paths and line numbers.

        Save the review report using mcp__fleetlift__artifact__create with name="pr-review" and content_type="text/markdown".
        If the PR has changes that are unclear or you need author clarification to complete
        the review (e.g. ambiguous intent, missing context for a design decision), use the
        mcp__fleetlift__inbox__request_input tool to ask the team. This pauses the review until they respond.
      output:
        schema:
          comments: "array"
          summary: "string"
          approval: "string"

  - id: post-comments
    title: Post review comments
    depends_on:
      - review
    action:
      type: github_pr_review
      credentials:
        - GITHUB_TOKEN
      config:
        repo_url: "{{ .Params.repo_url }}"
        pr_number: "{{ .Params.pr_number }}"
        summary: "{{ .Steps.review.Output.summary }}"
