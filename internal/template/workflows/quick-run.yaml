version: 1
id: quick-run
title: Quick Run
description: >
  Single-step ad-hoc task execution. Type a prompt, point at a repo, and run.
hidden: true
tags:
  - quick-run
  - ad-hoc

parameters:
  - name: prompt
    type: string
    required: true
    description: What you want the agent to do

  - name: repo_url
    type: string
    required: true
    description: "Repository URL, e.g. https://github.com/org/repo"

  - name: branch
    type: string
    required: false
    description: "Branch to work on (default: main)"

  - name: create_pr
    type: bool
    required: false
    description: Open a PR if the agent makes changes

steps:
  - id: execute
    title: Execute task
    mode: transform
    repositories:
      - url: "{{ .Params.repo_url }}"
        ref: "{{ if .Params.branch }}{{ .Params.branch }}{{ end }}"
    execution:
      agent: claude-code
      credentials:
        - GITHUB_TOKEN
      prompt: "{{ .Params.prompt }}"
    pull_request:
      branch_prefix: agent/quick-run
      title: "{{ .Params.prompt }}"
      body: Automated changes from Fleetlift Quick Run
      draft: true
