version: 1
id: incident-response
title: Incident Response
description: Analyze logs, propose fix, apply fix with approval, verify deployment.
tags:
  - incident
  - fix
  - single-repo
parameters:
  - name: repo_url
    type: string
    required: true
    description: "Repository URL of the affected service"
  - name: log_excerpt
    type: string
    required: true
    description: "Relevant log output showing the incident"
  - name: incident_description
    type: string
    required: true
    description: "Description of the incident"
  - name: deploy_check_command
    type: string
    required: false
    description: "Command to verify deployment health"
  - name: slack_channel
    type: string
    required: false
    description: "Slack channel for incident notifications"
steps:
  - id: analyze_logs
    title: Analyze logs
    sandbox_group: main
    mode: report
    repositories:
      - url: "{{ .Params.repo_url }}"
    execution:
      agent: claude-code
      prompt: |
        Analyze these logs and the codebase to identify the root cause of this incident.

        Incident:
        {{ .Params.incident_description }}

        Logs:
        {{ .Params.log_excerpt }}

        Trace the error through the code. Identify the root cause and affected components.

        Call mcp__fleetlift__progress__update as you trace the error.
        Save the root cause analysis using mcp__fleetlift__artifact__create with name="incident-analysis" and content_type="text/markdown".
        Once you identify the root cause, use the mcp__fleetlift__inbox__notify tool to immediately alert the team
        with the root cause summary — don't wait for the full pipeline to complete.
      output:
        schema:
          root_cause: "string"
          affected_files: "array"
          severity: "string"

  - id: propose_fix
    title: Propose fix
    depends_on:
      - analyze_logs
    sandbox_group: main
    mode: report
    execution:
      agent: claude-code
      prompt: |
        Based on the root cause analysis, propose a fix.

        Root cause:
        {{ .Steps.analyze_logs.Output | toJSON }}

        Describe the exact changes needed. Include which files to modify and what the changes should be.
        Consider the minimal safe fix that addresses the immediate issue.

        Save the fix proposal using mcp__fleetlift__artifact__create with name="fix-proposal" and content_type="text/markdown".
        If there are multiple valid fix strategies with different risk profiles, use the
        mcp__fleetlift__inbox__request_input tool to let the on-call engineer choose. Provide options describing
        each approach and its tradeoffs (e.g. "Hotfix: revert the breaking change" vs
        "Full fix: patch the root cause"). This pauses until the engineer responds.

  - id: fix
    title: Apply fix
    depends_on:
      - propose_fix
    sandbox_group: main
    mode: transform
    approval_policy: always
    allow_mid_execution_pause: true
    execution:
      agent: claude-code
      prompt: |
        Apply the proposed fix for this incident.

        Root cause analysis:
        {{ .Steps.analyze_logs.Output | toJSON }}

        Make the minimal code changes needed. Run tests to verify the fix.

        Call mcp__fleetlift__progress__update at key milestones (applying changes, running tests).
        If you discover any repo-specific patterns or gotchas, record them with mcp__fleetlift__memory__add_learning.

  - id: deploy_check
    title: Verify deployment readiness
    depends_on:
      - fix
    sandbox_group: main
    mode: report
    execution:
      agent: claude-code
      prompt: |
        Verify the fix is ready for deployment.

        Run the deployment check and confirm the service would be healthy after deploy.
        Deploy check command: {{ .Params.deploy_check_command }}

  - id: notify
    title: Post incident summary
    depends_on:
      - deploy_check
    condition: '{{ ne .params.slack_channel "" }}'
    optional: true
    action:
      type: slack_notify
      config:
        channel: "{{ .Params.slack_channel }}"
        message: |
          Incident response complete for {{ .Params.repo_url }}.
          Root cause: {{ .Steps.analyze_logs.Output.root_cause }}
          Fix applied and verified.
