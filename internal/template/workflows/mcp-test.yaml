version: 1
id: mcp-test
title: MCP Sidecar Test
description: Diagnostic workflow — verifies MCP sidecar provisioning, all 7 backend API endpoints, and optionally Claude Code MCP discovery.
tags:
  - test
  - diagnostic
  - mcp
parameters:
  - name: include_agent_step
    type: string
    required: false
    default: "false"
    description: "Set to 'true' to run the optional Claude Code agent step (costs AI tokens)"
steps:
  - id: verify_mcp_endpoints
    title: Verify MCP sidecar and API endpoints
    sandbox_group: mcp-test
    mode: report
    execution:
      agent: shell
      prompt: |
        . /etc/profile.d/fleetlift-mcp.sh 2>/dev/null
        exec perl -e '
        use strict; use warnings; use IO::Socket::INET;
        my $port = $ENV{FLEETLIFT_MCP_PORT} || die "FAIL: FLEETLIFT_MCP_PORT not set\n";
        my $token = $ENV{FLEETLIFT_MCP_TOKEN} || die "FAIL: FLEETLIFT_MCP_TOKEN not set\n";
        my $api = "host.docker.internal:8080";
        my ($pass,$fail) = (0,0);

        sub http_req {
          my ($method,$path,$body) = @_;
          my $s = IO::Socket::INET->new(PeerAddr=>$api,Timeout=>5) or return (0,"connect failed");
          my $req = "$method $path HTTP/1.0\r\nHost: $api\r\nAuthorization: Bearer $token\r\n";
          if ($body) { $req .= "Content-Type: application/json\r\nContent-Length: ".length($body)."\r\n\r\n$body"; }
          else { $req .= "\r\n"; }
          print $s $req;
          my $resp = join "", <$s>;
          close $s;
          $resp =~ /^HTTP\/\S+\s+(\d+)/s or return (0,"no status");
          return ($1, $resp);
        }

        sub check {
          my ($name,$expect,$got) = @_;
          if ($got == $expect) { print "PASS: $name (HTTP $got)\n"; $pass++; }
          else { print "FAIL: $name — expected HTTP $expect, got $got\n"; $fail++; }
        }

        # Health check (retry 5x)
        my $healthy = 0;
        for (1..5) {
          my $s = IO::Socket::INET->new(PeerAddr=>"localhost:$port",Timeout=>1);
          if ($s) { print $s "GET /health HTTP/1.0\r\nHost: localhost\r\n\r\n"; my $r=join"",$s->getlines; close $s; if ($r=~/ok/) { $healthy=1; last; } }
          sleep 1;
        }
        if ($healthy) { print "PASS: sidecar health check\n"; $pass++; }
        else { die "FAIL: sidecar health check — not responding after 5s\n"; }

        # 1. POST /progress
        my ($c,$r) = http_req("POST","/api/mcp/progress",q({"percentage":25,"message":"mcp-test-shell"}));
        check("POST /progress",200,$c);

        # 2. POST /artifacts
        ($c,$r) = http_req("POST","/api/mcp/artifacts",q({"name":"mcp-test-shell.txt","content":"hello from shell"}));
        check("POST /artifacts",201,$c);
        print "  artifact_id present\n" if $r =~ /artifact_id/;

        # 3. GET /run
        ($c,$r) = http_req("GET","/api/mcp/run",undef);
        check("GET /run",200,$c);
        print "  run_id present\n" if $r =~ /run_id/;

        # 4. POST /knowledge
        ($c,$r) = http_req("POST","/api/mcp/knowledge",q({"type":"pattern","summary":"mcp-test-learning","details":"integration test"}));
        check("POST /knowledge",201,$c);

        # 5. GET /knowledge/search
        ($c,$r) = http_req("GET","/api/mcp/knowledge/search?q=mcp-test&max=5",undef);
        check("GET /knowledge/search",200,$c);

        # 6. GET /knowledge
        ($c,$r) = http_req("GET","/api/mcp/knowledge?max=5",undef);
        check("GET /knowledge",200,$c);

        # 7. GET /steps/nonexistent/output (expect 404)
        ($c,$r) = http_req("GET","/api/mcp/steps/nonexistent/output",undef);
        check("GET /steps/nonexistent/output",404,$c);

        print "\nResults: $pass passed, $fail failed\n";
        exit 1 if $fail > 0;
        print "mcp-endpoints: ALL PASSED\n";
        '

  - id: agent_uses_mcp
    title: Agent uses MCP tools
    depends_on:
      - verify_mcp_endpoints
    sandbox_group: mcp-test
    mode: report
    execution:
      agent: shell
      prompt: |
        if [ "{{ .Params.include_agent_step }}" != "true" ]; then echo "agent step skipped"; exit 0; fi
        . /etc/profile.d/fleetlift-mcp.sh 2>/dev/null || true
        test -n "${FLEETLIFT_MCP_PORT:-}" || { echo "FAIL: FLEETLIFT_MCP_PORT not set"; exit 1; }
        mkdir -p /workspace
        printf "{\"mcpServers\":{\"fleetlift\":{\"type\":\"sse\",\"url\":\"http://localhost:%s/sse\"}}}" "$FLEETLIFT_MCP_PORT" > /workspace/.mcp.json
        cd /workspace
        claude -p "You have MCP tools available from the fleetlift server. Do these in order: (1) Use the progress.update tool to report 75 percent progress with message agent-mcp-test. (2) Use the artifact.create tool to create an artifact named mcp-test-agent.txt with content hello from agent mcp. (3) Print DONE." --output-format stream-json --dangerously-skip-permissions --max-turns 10 2>&1 || true
        echo "agent-mcp-step-complete"
