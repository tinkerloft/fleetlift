version: 1
id: mcp-test
title: MCP Sidecar Test
description: >
  Verifies MCP sidecar provisioning end-to-end: shell step exercises all API
  endpoints via raw HTTP, then a Claude Code agent step confirms the agent can
  discover and call MCP tools naturally.
tags:
  - test
  - diagnostic
  - mcp
steps:
  - id: verify_mcp_endpoints
    title: Verify MCP sidecar and API endpoints
    sandbox_group: mcp-test
    mode: report
    execution:
      agent: shell
      prompt: |
        . /tmp/fleetlift-mcp-env.sh 2>/dev/null
        echo "DEBUG: PORT=$FLEETLIFT_MCP_PORT TOKEN_PREFIX=${FLEETLIFT_MCP_TOKEN:0:20}"
        test -n "$FLEETLIFT_MCP_PORT" || { echo "FAIL: FLEETLIFT_MCP_PORT not set"; exit 1; }
        test -n "$FLEETLIFT_MCP_TOKEN" || { echo "FAIL: FLEETLIFT_MCP_TOKEN not set"; exit 1; }
        printf %s  | base64 -d > /tmp/mcp_test.pl
        perl /tmp/mcp_test.pl

  - id: agent_uses_mcp
    title: Agent uses MCP tools
    depends_on:
      - verify_mcp_endpoints
    mode: report
    execution:
      agent: claude-code
      prompt: |
        You are running an MCP connectivity test for the fleetlift platform.

        Please do the following steps in order — do not skip any:

        1. Call mcp__fleetlift__progress__update with percentage=75 and message="agent-mcp-test"
        2. Call mcp__fleetlift__artifact__create with name="mcp-test-agent.txt", content="hello from claude-code agent", and content_type="text/plain"
        3. Print "AGENT-MCP-TEST: DONE" when both calls succeed.

        If any MCP tool call fails, print "AGENT-MCP-TEST: FAILED - <reason>" and exit.
